<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 Million Checkboxes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Space+Grotesk:wght@400;500;600&display=swap"
        rel="stylesheet"
    >
    <style>
        :root {
            --ink: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --accent-deep: #0284c7;
            --paper: #0b1120;
            --card: #0f172a;
            --shadow: 0 24px 60px rgba(3, 7, 18, 0.55);
            --ring: 0 0 0 3px rgba(56, 189, 248, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Space Grotesk", "Segoe UI", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(1200px circle at 10% -10%, rgba(14, 116, 144, 0.45) 0%, transparent 55%),
                radial-gradient(1000px circle at 90% 0%, rgba(30, 64, 175, 0.45) 0%, transparent 55%),
                linear-gradient(180deg, #0b1120 0%, #111827 65%, #0f172a 100%);
            padding: 64px 20px 88px;
        }

        .page {
            max-width: 1100px;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            font-family: "Fraunces", "Space Grotesk", serif;
            font-size: clamp(2.6rem, 6vw, 4.2rem);
            margin: 0 0 0.6rem;
            color: var(--ink);
            font-weight: 700;
            letter-spacing: -0.02em;
            text-shadow: 0 18px 40px rgba(3, 7, 18, 0.55);
            animation: float-in 700ms ease both;
        }

        p {
            font-size: clamp(1.05rem, 2.4vw, 1.25rem);
            color: var(--muted);
            margin: 0 auto 2.2rem;
            max-width: 620px;
            animation: float-in 800ms ease 120ms both;
        }

        .error-banner {
            position: fixed;
            top: 28px;
            left: 50%;
            transform: translateX(-50%);
            max-width: min(720px, 92vw);
            padding: 12px 18px;
            border-radius: 999px;
            background: rgba(248, 113, 113, 0.16);
            border: 1px solid rgba(248, 113, 113, 0.4);
            color: #fecaca;
            font-size: 0.98rem;
            letter-spacing: 0.01em;
            display: none;
            z-index: 20;
            box-shadow: 0 16px 40px rgba(248, 113, 113, 0.25);
            animation: float-in 600ms ease both;
        }

        .error-banner.is-visible {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .error-banner span {
            font-weight: 600;
        }

        #checkbox-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(22px, 1fr));
            gap: 6px;
            padding: 24px;
            background: linear-gradient(140deg, rgba(15, 23, 42, 0.98), rgba(30, 41, 59, 0.92));
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(148, 163, 184, 0.12);
            animation: float-in 900ms ease 240ms both;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
            cursor: pointer;
            accent-color: var(--accent);
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }

        input[type="checkbox"]:hover {
            transform: translateY(-1px) scale(1.08);
        }

        input[type="checkbox"]:focus-visible {
            outline: none;
            box-shadow: var(--ring);
            border-radius: 4px;
        }

        @keyframes float-in {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 720px) {
            body {
                padding: 48px 16px 72px;
            }

            #checkbox-container {
                padding: 18px;
                border-radius: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <h1>1 Million Checkboxes</h1>
        <p>This page contains 1 million checkboxes. Scroll down to see them all!</p>
        <div id="error-banner" class="error-banner" role="status" aria-live="polite"></div>
        <div id="checkbox-container"></div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const container = document.getElementById("checkbox-container");
        const errorBanner = document.getElementById("error-banner");
        const CHECKBOX_COUNT = 2000;
        const accessToken = localStorage.getItem("access_token");
        const socket = io({
            auth: {
                token: accessToken
            }
        });
        
        let errorTimer;

        socket.on("server:checkbox:change", (data) => {
            console.log("Received checkbox change from server:", data);
            const { index, checked } = data;
            const checkbox = document.getElementById(`checkbox-${index}`);
            if (checkbox) {
                checkbox.checked = checked;
            }
        })

        socket.on("server:error:rate_limit", (data) => {
            const errorMsg = data?.error || "You are sending updates too quickly. Please slow down.";
            if (!errorBanner) {
                return;
            }

            errorBanner.innerHTML = `<span>Rate limit</span> ${errorMsg}`;
            errorBanner.classList.add("is-visible");
            clearTimeout(errorTimer);
            errorTimer = setTimeout(() => {
                errorBanner.classList.remove("is-visible");
            }, 4000);
        });

        socket.on("server:error:unauthorized", () => {
            window.location.href = "/signup.html";
        });

        window.addEventListener("load", async () => {
            const res = await fetch("/checkboxes", { method: "GET" });
            const data = await res.json();
            if (data && data.checkboxes) {
                data.checkboxes.forEach(( serverValue, index ) => {
                    const checkbox = document.createElement("input");
                    checkbox.type = "checkbox";
                    checkbox.id = `checkbox-${index}`;
                    checkbox.checked = serverValue;

                    checkbox.addEventListener("change", (e) => {
                        const checked = e.target.checked;
                        console.log("Checkbox changed:", { index, checked });

                        if (!accessToken) {
                            window.location.href = "/signup.html";
                            return;
                        }

                        socket.emit("client:checkbox:change", { index, checked });
                    });

                    container.appendChild(checkbox);
                });
            }
        })

        // new Array(CHECKBOX_COUNT).fill(null).forEach((_, index) => {
        //     const checkbox = document.createElement("input");
        //     checkbox.type = "checkbox";
        //     checkbox.id = `checkbox-${index}`;
        //     checkbox.checked = false;

        //     checkbox.addEventListener("change", (e) => {
        //         const checked = e.target.checked;
        //         console.log("Checkbox changed:", { index, checked });
        //         socket.emit("client:checkbox:change", { index, checked });
        //     });

        //     container.appendChild(checkbox);
        // });

    </script>
</body>
</html>
