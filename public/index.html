<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 Million Checkboxes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #ffffff;
            --fg: #09090b;
            --muted: #71717a;
            --muted-bg: #f4f4f5;
            --border: #e4e4e7;
            --input-bg: #ffffff;
            --ring: #18181b;
            --card-bg: #ffffff;
            --card-shadow: 0 1px 3px 0 rgb(0 0 0 / .1), 0 1px 2px -1px rgb(0 0 0 / .1);
            --radius: 0.5rem;
            --btn-bg: #18181b;
            --btn-fg: #fafafa;
            --btn-hover: #27272a;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #09090b;
                --fg: #fafafa;
                --muted: #a1a1aa;
                --muted-bg: #27272a;
                --border: #27272a;
                --input-bg: #09090b;
                --ring: #d4d4d8;
                --card-bg: #18181b;
                --card-shadow: 0 1px 3px 0 rgb(0 0 0 / .4), 0 1px 2px -1px rgb(0 0 0 / .4);
                --btn-bg: #fafafa;
                --btn-fg: #18181b;
                --btn-hover: #e4e4e7;
            }
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--fg);
            min-height: 100dvh;
            padding: 1.25rem;
            -webkit-font-smoothing: antialiased;
        }

        .page {
            max-width: 1100px;
            margin: 0 auto;
        }

        .shell {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: calc(var(--radius) + 8px);
            box-shadow: var(--card-shadow);
            padding: 1.75rem;
        }

        .topbar {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: start;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .title {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            text-align: center;
            align-items: center;
            grid-column: 2;
        }

        h1 {
            font-size: 1.375rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            line-height: 1.3;
        }

        p {
            font-size: 0.875rem;
            color: var(--muted);
            line-height: 1.5;
            max-width: 60ch;
        }

        .btn {
            grid-column: 3;
            justify-self: end;
            height: 2.125rem;
            padding: 0 0.875rem;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--btn-fg);
            background: var(--btn-bg);
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background 0.15s, opacity 0.15s;
            white-space: nowrap;
        }

        .btn:hover { background: var(--btn-hover); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .toast {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            width: min(520px, calc(100vw - 2rem));
            display: none;
            z-index: 20;
            font-size: 0.8125rem;
            color: #ef4444;
            background: color-mix(in srgb, #ef4444 10%, transparent);
            border: 1px solid color-mix(in srgb, #ef4444 25%, transparent);
            border-radius: var(--radius);
            padding: 0.625rem 0.75rem;
            box-shadow: var(--card-shadow);
        }

        .toast.is-visible { display: block; }

        #checkbox-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(22px, 1fr));
            gap: 6px;
            padding: 1rem;
            background: var(--muted-bg);
            border: 1px solid var(--border);
            border-radius: calc(var(--radius) + 8px);
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
            cursor: pointer;
            accent-color: var(--btn-bg);
            transition: transform 0.12s ease;
        }

        input[type="checkbox"]:hover { transform: translateY(-1px) scale(1.08); }

        input[type="checkbox"]:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--ring) 20%, transparent);
            border-radius: 4px;
        }

        @media (max-width: 720px) {
            body { padding: 1rem; }
            .shell { padding: 1.25rem; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div id="error-banner" class="toast" role="status" aria-live="polite"></div>
        <div class="shell">
            <div class="topbar">
                <div class="title">
                    <h1>1 Million Checkboxes</h1>
                    <p>This page contains 1 million checkboxes. Scroll down to see them all!</p>
                </div>
                <button id="logoutBtn" class="btn" type="button">Logout</button>
            </div>
            <div id="checkbox-container"></div>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const container = document.getElementById("checkbox-container");
        const errorBanner = document.getElementById("error-banner");
        const logoutBtn = document.getElementById("logoutBtn");
        const CHECKBOX_COUNT = 2000;
        const initialAccessToken = localStorage.getItem("access_token");

        const getAccessToken = () => localStorage.getItem("access_token");

        const syncAuthButton = () => {
            if (!logoutBtn) return;
            const token = getAccessToken();
            logoutBtn.textContent = token ? "Logout" : "Login";
            logoutBtn.disabled = false;
        };

        syncAuthButton();
        const socket = io({
            auth: {
                token: initialAccessToken
            }
        });
        
        let errorTimer;

        socket.on("server:checkbox:change", (data) => {
            console.log("Received checkbox change from server:", data);
            const { index, checked } = data;
            const checkbox = document.getElementById(`checkbox-${index}`);
            if (checkbox) {
                checkbox.checked = checked;
            }
        })

        socket.on("server:error:rate_limit", (data) => {
            const errorMsg = data?.error || "You are sending updates too quickly. Please slow down.";
            if (!errorBanner) {
                return;
            }

            errorBanner.textContent = `Rate limit: ${errorMsg}`;
            errorBanner.classList.add("is-visible");
            clearTimeout(errorTimer);
            errorTimer = setTimeout(() => {
                errorBanner.classList.remove("is-visible");
            }, 4000);
        });

        socket.on("server:error:unauthorized", () => {
            localStorage.removeItem("access_token");
            try { socket.disconnect(); } catch {}
            window.location.href = "/login";
        });

        if (logoutBtn) {
            logoutBtn.addEventListener("click", async () => {
                const token = getAccessToken();
                if (!token) {
                    window.location.href = "/login";
                    return;
                }

                logoutBtn.disabled = true;
                try {
                    await fetch("/api/auth/logout", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${token}`
                        },
                        credentials: "include"
                    }).catch(() => undefined);
                } finally {
                    localStorage.removeItem("access_token");
                    try { socket.disconnect(); } catch {}
                    window.location.href = "/login";
                }
            });
        }

        window.addEventListener("load", async () => {
            const res = await fetch("/checkboxes", { method: "GET" });
            const data = await res.json();
            if (data && data.checkboxes) {
                data.checkboxes.forEach(( serverValue, index ) => {
                    const checkbox = document.createElement("input");
                    checkbox.type = "checkbox";
                    checkbox.id = `checkbox-${index}`;
                    checkbox.checked = serverValue;

                    checkbox.addEventListener("change", (e) => {
                        const checked = e.target.checked;
                        console.log("Checkbox changed:", { index, checked });

                        const token = getAccessToken();
                        if (!token) {
                            window.location.href = "/login";
                            return;
                        }

                        socket.emit("client:checkbox:change", { index, checked });
                    });

                    container.appendChild(checkbox);
                });
            }
        })

        // new Array(CHECKBOX_COUNT).fill(null).forEach((_, index) => {
        //     const checkbox = document.createElement("input");
        //     checkbox.type = "checkbox";
        //     checkbox.id = `checkbox-${index}`;
        //     checkbox.checked = false;

        //     checkbox.addEventListener("change", (e) => {
        //         const checked = e.target.checked;
        //         console.log("Checkbox changed:", { index, checked });
        //         socket.emit("client:checkbox:change", { index, checked });
        //     });

        //     container.appendChild(checkbox);
        // });

    </script>
</body>
</html>
